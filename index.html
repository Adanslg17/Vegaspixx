<style>

#loading-overlay{position:fixed;inset:0;z-index:9998;background:rgba(6,6,10,0.92);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}

.err-box{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:9px 14px;font-size:12px;color:#f87171;margin-bottom:16px}
.form-lbl{font-size:11px;color:#4a4760;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────────
const { createClient } = window.supabase;
const sb = createClient(
  "https://sqapqgneiknczwpwvtrq.supabase.co",
  "sb_publishable_L5LEMmtW6ql9NmIvccF9zQ_dynHWIaY"
);

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const ADMIN_PWD = "VegasPix2025!";
const LEAGUES = {"Fútbol":["Liga MX","Liga de Expansión MX","Liga MX Femenil","Premier League","La Liga","Bundesliga","Serie A","Ligue 1","UEFA Champions League","UEFA Europa League","MLS","Liga BetPlay Dimayor","J1 League","Copa MX","Otra"],"Básquetbol":["NBA","G League","NCAA Basketball","EuroLeague","WNBA","Otra"],"Béisbol":["MLB","Liga Mexicana de Béisbol","Liga Mexicana del Pacífico","NPB (Japón)","KBO","Otra"],"Tenis":["ATP Tour","WTA Tour","Australian Open","Roland Garros","Wimbledon","US Open","Copa Davis","ATP 500","Otra"]};
const BOOKS = ["Bet365","DraftKings","FanDuel","BetMGM","Caesars Sportsbook","Betway","1xBet","Codere","Caliente","Betcris","Sportingbet","PointsBet","William Hill","Pinnacle","Otra"];
const ICON = {"Fútbol":"⚽","Básquetbol":"🏀","Béisbol":"⚾","Tenis":"🎾"};
const SM = {
  upcoming:{label:"Previo",bg:"rgba(56,189,248,0.1)",c:"#38bdf8",bc:"rgba(56,189,248,0.25)"},
  live:{label:"En Progreso",bg:"rgba(74,222,128,0.1)",c:"#4ade80",bc:"rgba(74,222,128,0.25)"},
  pending_result:{label:"Esperando Resultado",bg:"rgba(212,160,23,0.1)",c:"#d4a017",bc:"rgba(212,160,23,0.3)"},
  won:{label:"✓ Ganado",bg:"rgba(74,222,128,0.1)",c:"#4ade80",bc:"rgba(74,222,128,0.25)"},
  lost:{label:"✕ Perdido",bg:"rgba(248,113,113,0.1)",c:"#f87171",bc:"rgba(248,113,113,0.25)"},
  void:{label:"Anulado",bg:"rgba(148,148,170,0.1)",c:"#9494aa",bc:"rgba(148,148,170,0.2)"},
  push:{label:"Push",bg:"rgba(99,179,237,0.1)",c:"#63b3ed",bc:"rgba(99,179,237,0.25)"}
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = {
  page:"home", authUser:null, profile:null,
  picks:[], users:[], isAdmin:false,
  atab:"picks", pf:"Todos", hf:{sport:"Todos",res:"all"},
  selUser:null, editing:null, userQ:""
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
async function sha(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s+"__VP__"));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}
function gst(p){if(["won","lost","void","push"].includes(p.status))return p.status;const now=Date.now(),mt=new Date(p.date+"T"+p.time).getTime();if(mt>now)return"upcoming";if(mt+10800000>now)return"live";return"pending_result";}
function fmtO(n){return n>=0?"+"+n:""+n;}
function fmtD(s){try{return new Date(s+"T12:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});}catch{return s;}}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
const me = () => S.profile;

// ── LOADING ───────────────────────────────────────────────────────────────────
function setLoad(v){const el=document.getElementById("loading-overlay");if(el)el.style.display=v?"flex":"none";}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let TT;
function toast(msg,type="ok"){const el=document.getElementById("toast");el.textContent=msg;el.style.display="block";el.style.background=type==="ok"?"#d4a017":type==="err"?"#dc2626":"#1a1828";el.style.color=type==="ok"?"#0a0808":"#fff";el.style.border="1px solid "+(type==="ok"?"#e8b520":type==="err"?"#ef4444":"#2e2c3d");if(TT)clearTimeout(TT);TT=setTimeout(()=>el.style.display="none",3800);}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadPicks(){
  const{data,error}=await sb.from("picks").select("*").order("created_at",{ascending:false});
  if(!error&&data)S.picks=data;
}

async function loadProfile(uid){
  const{data}=await sb.from("profiles").select("*, transactions(*)").eq("id",uid).single();
  if(data){data.txs=(data.transactions||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));S.profile=data;}
}

async function loadUsers(){
  const{data}=await sb.from("profiles").select("*, transactions(*)").order("created_at",{ascending:false});
  if(data){S.users=data.map(u=>({...u,txs:(u.transactions||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))}));}
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doRegister(username,email,pw){
  if(!username||!email||!pw)return"Completa todos los campos";
  if(pw.length<8)return"Contraseña mínimo 8 caracteres";
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return"Correo inválido";
  const{data:ex}=await sb.from("profiles").select("id").eq("username",username).maybeSingle();
  if(ex)return"Nombre de usuario no disponible";
  const{error}=await sb.auth.signUp({email,password:pw,options:{data:{username}}});
  if(error){if(error.message.includes("already"))return"Correo ya registrado";return error.message;}
  return null;
}

async function doLogin(email,pw){
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error)return"Correo o contraseña incorrectos";
  return null;
}

async function doAdminAuth(pw){
  const h=await sha(pw),ah=await sha(ADMIN_PWD);
  if(h!==ah)return"Contraseña incorrecta";
  S.isAdmin=true;closeModal();
  setLoad(true);await loadUsers();setLoad(false);
  go("admin");toast("Panel admin activo");
  return null;
}

function logout(){sb.auth.signOut();}

// ── PICKS CRUD ────────────────────────────────────────────────────────────────
async function addPick(data){
  const{data:pick,error}=await sb.from("picks").insert([{...data,status:"upcoming"}]).select().single();
  if(error){toast("Error al publicar","err");return;}
  S.picks.unshift(pick);S.atab="picks";S.editing=null;toast("Pick publicado");renderAll();
}

async function updPick(id,data){
  const{error}=await sb.from("picks").update({...data,updated_at:new Date().toISOString()}).eq("id",id);
  if(error){toast("Error al actualizar","err");return;}
  const i=S.picks.findIndex(p=>p.id===id);
  if(i!==-1)S.picks[i]={...S.picks[i],...data,updated_at:new Date().toISOString()};
  toast("Pick actualizado");renderAll();
}

async function doDelPick(id){
  if(!confirm("¿Eliminar este pick?"))return;
  const{error}=await sb.from("picks").delete().eq("id",id);
  if(error){toast("Error al eliminar","err");return;}
  S.picks=S.picks.filter(p=>p.id!==id);toast("Pick eliminado","info");renderAll();
}

async function setRes(id,status){await updPick(id,{status});}

async function submitForm(){
  const match=document.getElementById("fm")?.value?.trim();
  const sel=document.getElementById("fsel")?.value?.trim();
  const odds=document.getElementById("fo")?.value?.trim();
  const date=document.getElementById("fd")?.value;
  const time=document.getElementById("ft")?.value;
  let ok=true;
  const se=(id,msg)=>{const el=document.getElementById(id);if(el)el.textContent=msg;if(msg)ok=false;};
  se("em",match?"":"Requerido");se("esel",sel?"":"Requerido");
  se("eo",(!odds||isNaN(parseInt(odds)))?"Cuota americana válida (ej: -110 o +150)":"");
  se("ed",date?"":"Requerido");se("et",time?"":"Requerido");
  if(!ok)return;
  const data={sport:document.getElementById("fs")?.value,league:document.getElementById("fl")?.value,match,selection:sel,odds:parseInt(odds),bookmaker:document.getElementById("fb")?.value,date,time,description:document.getElementById("fdesc")?.value?.trim()||"",confidence:parseInt(document.getElementById("fc")?.value||3)};
  const btn=document.getElementById("submit-btn");
  if(btn){btn.disabled=true;btn.textContent="Guardando...";}
  if(S.editing){await updPick(S.editing.id,data);S.editing=null;}
  else{await addPick(data);}
  if(btn){btn.disabled=false;btn.textContent=S.editing?"Actualizar Pick":"Publicar Pick";}
  S.atab="picks";renderAll();
}

async function applyBal(userId){
  const raw=document.getElementById("aa")?.value?.trim().replace(/,/g,".");
  const amt=parseFloat(raw);
  const note=document.getElementById("an")?.value?.trim();
  if(isNaN(amt)||amt===0){toast("Ingresa un monto válido","err");return;}
  if(!note){toast("Escribe el concepto","err");return;}
  const user=S.users.find(u=>u.id===userId);if(!user)return;
  const newBal=Math.max(0,user.balance+amt);
  const{error:e1}=await sb.from("profiles").update({balance:newBal}).eq("id",userId);
  if(e1){toast("Error al actualizar saldo","err");return;}
  const{data:tx,error:e2}=await sb.from("transactions").insert([{user_id:userId,amount:amt,note,balance_after:newBal}]).select().single();
  if(e2){toast("Error al registrar transacción","err");return;}
  user.balance=newBal;user.txs=[tx,...(user.txs||[])];
  // Refresh own profile if it is the logged user
  if(S.profile&&S.profile.id===userId)S.profile.balance=newBal;
  S.selUser=null;toast(`Saldo ${amt>=0?"acreditado":"descontado"}: $${Math.abs(amt).toFixed(2)} MXN`);renderAll();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function go(page){S.page=page;renderAll();}

function renderNav(){
  const pages=[["home","Inicio"],["picks","Picks"],["history","Historial"],["deposits","Depósitos"],["apostar","Apostar"],["about","Nosotros"]];
  const m=me();
  let links=pages.map(([p,l])=>`<button onclick="go('${p}')" class="nav-btn${S.page===p?" on":""}">${l}</button>`).join("");
  if(m)links+=`<button onclick="go('profile')" class="nav-btn${S.page==="profile"?" on":""}">Mi Cuenta</button>`;
  if(S.isAdmin)links+=`<button onclick="go('admin')" style="background:none;border:none;color:#f87171;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">⚙ Admin</button>`;
  document.getElementById("nav-links").innerHTML=links;
  let auth="";
  if(m){auth=`<span style="font-size:12px;color:#4a4760">${esc(m.username)}</span><button onclick="logout()" class="btn-ghost" style="padding:6px 14px;font-size:12px">Salir</button>`;}
  else{auth=`<button onclick="showModal('login')" style="background:none;border:none;color:#9390a8;font-size:13px;font-weight:500;cursor:pointer">Iniciar Sesión</button><button onclick="showModal('register')" class="btn-gold" style="padding:7px 16px;font-size:13px">Registrarse</button>`;}
  if(!S.isAdmin)auth+=`<button onclick="showModal('admin_pw')" style="background:none;border:none;color:#2e2c3d;font-size:16px;cursor:pointer;padding:4px" title="Admin">⚙</button>`;
  document.getElementById("nav-auth").innerHTML=auth;
}

function renderMain(){
  const p=S.page;let html="";
  if(p==="home")html=pgHome();
  else if(p==="picks")html=pgPicks();
  else if(p==="history")html=pgHistory();
  else if(p==="deposits")html=pgDeposits();
  else if(p==="about")html=pgAbout();
  else if(p==="profile")html=pgProfile();
  else if(p==="apostar")html=pgApostar();
  else if(p==="admin")html=S.isAdmin?pgAdmin():pgUnauth();
  document.getElementById("main").innerHTML=`<div class="page">${html}</div>`;
}

function renderAll(){renderNav();renderMain();}

function stats(){
  const fin=S.picks.filter(p=>["won","lost"].includes(p.status));
  const wins=S.picks.filter(p=>p.status==="won").length;
  const wr=fin.length?Math.round(wins/fin.length*100):0;
  const s=[...fin].sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
  let n=0,t=null;if(s.length){t=s[0].status;for(const p of s){if(p.status===t)n++;else break;}}
  return{total:S.picks.length,wins,wr,streak:n,stype:t};
}

// ── PICK CARD ─────────────────────────────────────────────────────────────────
function pickCard(pick,admin=false){
  const st=gst(pick);const m=SM[st]||SM.upcoming;const oc=pick.odds>=0?"#4ade80":"#d4a017";const live=st==="live";
  return`<div class="card" style="padding:18px 20px">
    <div class="flex wrap ai jb g12" style="margin-bottom:14px">

          ${type==="register"?`<input class="vp-input" id="mpw2" type="password" placeholder="Confirmar contraseña">`:""}
          ${type==="admin_pw"?`<p style="font-size:11px;color:#3a3860;text-align:center">Área restringida. Solo personal autorizado.</p>`:""}
          <button onclick="doModal('${type}')" id="mbtn" class="btn-gold" style="padding:11px;width:100%">${{login:"Entrar",register:"Crear Cuenta",admin_pw:"Acceder"}[type]}</button>
          ${type==="login"?`<p style="font-size:12px;color:#4a4760;text-align:center">¿Sin cuenta? <button onclick="showModal('register')" style="background:none;border:none;color:#d4a017;font-size:12px;cursor:pointer">Regístrate</button></p>`:""}
          ${type==="register"?`<p style="font-size:12px;color:#4a4760;text-align:center">¿Ya tienes cuenta? <button onclick="showModal('login')" style="background:none;border:none;color:#d4a017;font-size:12px;cursor:pointer">Inicia sesión</button></p>`:""}

function closeModal(){document.getElementById("overlay").innerHTML="";}
function merr(msg){const el=document.getElementById("merr");if(el)el.innerHTML=msg?`<div class="err-box">${esc(msg)}</div>`:"";}

async function doModal(type){
  const btn=document.getElementById("mbtn");
  if(btn){btn.disabled=true;btn.textContent="Verificando...";}
  try{
    if(type==="login"){
      const email=document.getElementById("mun")?.value?.trim();
      const pw=document.getElementById("mpw")?.value;
      if(!email||!pw){merr("Completa todos los campos");return;}
      const err=await doLogin(email,pw);
      if(err){merr(err);return;}
      closeModal();
    }else if(type==="register"){
      const un=document.getElementById("mun")?.value?.trim();
      const em=document.getElementById("mem")?.value?.trim();
      const pw=document.getElementById("mpw")?.value;
      const pw2=document.getElementById("mpw2")?.value;
      if(!un||!em||!pw){merr("Completa todos los campos");return;}
      if(pw.length<8){merr("Contraseña mínimo 8 caracteres");return;}
      if(pw!==pw2){merr("Las contraseñas no coinciden");return;}
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){merr("Correo inválido");return;}
      const err=await doRegister(un,em,pw);
      if(err){merr(err);return;}
      closeModal();
      toast("¡Cuenta creada! Ahora inicia sesión.");
    }else if(type==="admin_pw"){
      const pw=document.getElementById("mpw")?.value;
      const err=await doAdminAuth(pw);
      if(err){merr(err);}
    }
  }finally{
    if(btn){btn.disabled=false;btn.textContent={login:"Entrar",register:"Crear Cuenta",admin_pw:"Acceder"}[type];}
  }
}

function editPick(id){S.editing=S.picks.find(p=>p.id===id);S.atab="add";renderMain();}
function setATab(t){S.atab=t;if(t!=="add")S.editing=null;renderMain();}
function updLeagues(){const s=document.getElementById("fs")?.value;const l=document.getElementById("fl");if(l&&s)l.innerHTML=(LEAGUES[s]||[]).map(x=>`<option>${x}</option>`).join("");}
function updOP(v){const el=document.getElementById("op");if(!el)return;const n=parseInt(v);if(!isNaN(n)){el.textContent="→ "+fmtO(n);el.style.color=n>=0?"#4ade80":"#d4a017";}else el.textContent="";}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  setLoad(true);
  await loadPicks();
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    S.authUser=session.user;
    await loadProfile(session.user.id);
  }
  setLoad(false);
  renderAll();

  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==="SIGNED_IN"&&session){
      S.authUser=session.user;
      await loadProfile(session.user.id);
      toast(`Bienvenido, ${S.profile?.username||"usuario"}`);
      renderAll();
    }else if(event==="SIGNED_OUT"){
      S.authUser=null;S.profile=null;S.isAdmin=false;
      go("home");
      toast("Sesión cerrada","info");
    }
  });

  setInterval(()=>{if(!(S.page==="admin"&&S.atab==="add"))loadPicks().then(()=>renderMain());},60000);
}

init();
</script>
